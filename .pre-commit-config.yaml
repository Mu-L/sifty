# Local git hooks via the pre-commit framework (https://pre-commit.com).
# Python-native equivalent of Husky. Set up once after a dev install:
#
#   pip install -e ".[dev]"
#   pre-commit install        # installs both the pre-commit and pre-push hooks
#
# These mirror the CI gate so failures show up locally first. Skip in a pinch
# with `git commit --no-verify`, but CI still enforces them on the PR.

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      # Lint on every commit (same as CI's `ruff check .`).
      - id: ruff
        name: ruff (lint)
        entry: ruff check --force-exclude
        language: python
        additional_dependencies: ["ruff>=0.4"]
        types_or: [python, pyi]
        require_serial: true

      # Run the test suite before pushing (same as CI). Needs the dev install.
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
